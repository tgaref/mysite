<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <!--  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"> -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="{{{prefix}}}/css/default.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/slideout/1.0.1/slideout.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      renderMathInElement(document.body, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false},
          {left: '\\(', right: '\\)', display: false},
          {left: '\\[', right: '\\]', display: true}
        ],
        throwOnError : false
      });
    });
  </script>
    
  <title>Theodoulos Garefalakis</title>
</head>


<body>
  <div x-data="{ open: false }">
    <nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation">
      <div class="container">
        <div class="navbar-brand">
          <a href="{{{prefix}}}/" class="navbar-item brand-logo">Theodoulos Garefalakis</a>

          <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" 
             :class="{ 'is-active': open }" @click="open = !open">
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </a>
        </div>

        <div class="navbar-menu" :class="{ 'is-active': open }">
          <div class="navbar-end">
            <a class="navbar-item nav-link" href="{{{prefix}}}/">Home</a>
            <a class="navbar-item nav-link" href="{{{prefix}}}/content/teaching/">Teaching</a>
            <a class="navbar-item nav-link" href="{{{prefix}}}/content/research/">Research</a>
            <a class="navbar-item nav-link" href="{{{prefix}}}/content/activities/">Activities</a>
            <div class="navbar-item">
              <button id="theme-toggle" class="button is-ghost" aria-label="Toggle theme">
                <span id="theme-icon"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>
    
    <main class="container main-content">
      {{{ content }}}
    </main>
  </div>

  <br>

  <footer class="footer">
    <div class="content has-text-centered">
      <p>
	<i class="fa fa-copyright"></i> Theodoulos Garefalakis. Site built with <a href="https://github.com/tgaref/avdou_ml">avdou_ml</a> and <a href="https://bulma.io/">Bulma</a>.
	Last update: {{ today }}.
      </p>
    </div>
  </footer>
  
</body>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    // Check for saved theme preference or default to light
    const currentTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', currentTheme);
    updateButtonIcon(currentTheme);

    // Toggle theme on button click
    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateButtonIcon(newTheme);
    });

    // Update button icon based on theme
    function updateButtonIcon(theme) {
      const iconContainer = document.getElementById('theme-icon');
      
      if (theme === 'dark') {
        iconContainer.outerHTML = '<i id="theme-icon" class="fa-solid fa-sun"></i>';
      } else {
        iconContainer.outerHTML = '<i id="theme-icon" class="fa-solid fa-moon"></i>';
      }
    }

    // Highlight active nav link
    document.addEventListener('DOMContentLoaded', () => {
      const currentUrl = window.location.href;
      document.querySelectorAll('.nav-link').forEach(link => {
        if (currentUrl === link.href || (currentUrl.endsWith('/') && link.href === currentUrl)) {
          link.classList.add('is-active');
        } else if (currentUrl.includes(link.href) && link.href !== window.location.origin + '{{{prefix}}}/') {
          // Highlight parent categories (e.g., highlighting "Teaching" when on a specific course page)
          link.classList.add('is-active');
        }
      });
    });
  </script>


</html>
